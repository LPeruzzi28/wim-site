<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIM!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="site-nav">
        <a href="#home" data-view-link="home">Accueil</a>
        <a href="#projets" data-view-link="projets">Réalisations</a>
        <a href="#inspirations" data-view-link="inspirations">Inspirations</a>
    </nav>

    <main>
        <section id="home" data-view="home">
            <section class="top">
                <section class="Intro">
                    <h1 id="title">What Inspire Me !</h1>
                    <p class="Intro-text">
                        
                    </p>
                </section>
            </section>
        </section>

        <section id="projets" data-view="projets">
            <section class="portfolio">
                <h2 id="portfolio-title">Réalisations</h2>
                <div class="portfolio-grid" id="portfolio-grid"></div>
            </section>

            <div class="portfolio-modal" id="portfolio-modal">
                <div class="portfolio-modal-content">
                    <button class="portfolio-modal-close" id="portfolio-modal-close" aria-label="Fermer">&times;</button>
                    <div class="portfolio-modal-media" id="portfolio-modal-media"></div>
                    <span class="portfolio-modal-tag" id="portfolio-modal-tag"></span>
                    <h3 id="portfolio-modal-title"></h3>
                    <p id="portfolio-modal-desc"></p>
                    <div class="portfolio-modal-links" id="portfolio-modal-links"></div>
                </div>
            </div>
        </section>

        <section id="inspirations" data-view="inspirations">
            <section class="inspo">
                <h2 id="inspo-title">Inspirations</h2>
                <p class="inspo-intro"></p>
                <div class="inspo-grid" id="inspo-grid"></div>
            </section>
        </section>
    </main>

    <div class="player" id="player">
        <audio id="player-audio"></audio>
        <button class="player-toggle" id="player-toggle" aria-label="Lecture">
            <svg class="icon-play" viewBox="0 0 24 24" width="18" height="18"><path d="M6 4l15 8-15 8V4z" fill="currentColor"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="18" height="18" hidden><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" fill="currentColor"/></svg>
        </button>
        <div class="player-body">
            <p class="player-title" id="player-title">—</p>
            <div class="player-bar" id="player-bar">
                <div class="player-bar-fill" id="player-bar-fill"></div>
            </div>
        </div>
        <button class="player-next" id="player-next" aria-label="Titre suivant">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 4l12 8-12 8V4zm13 0h2v16h-2V4z" fill="currentColor"/></svg>
        </button>
    </div>

    <script src="js/portfolio.js"></script>
    <script src="js/inspirations.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
